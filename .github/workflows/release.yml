name: Build and Release Electron App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      appId:
        description: "ID de app en config/apps.json"
        required: false
        default: "felizometro"
      arch:
        description: "Arquitectura linux"
        required: false
        default: "arm64"
      target:
        description: "Target de electron-builder"
        required: false
        default: "AppImage"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    env:
      APP_ID: ${{ inputs.appId || 'felizometro' }}
      APP_ARCH: ${{ inputs.arch || 'arm64' }}
      APP_TARGET: ${{ inputs.target || 'AppImage' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build artifacts
        run: npm run build:app -- --app "$APP_ID" --target "$APP_TARGET" --arch "$APP_ARCH"
        env:
          AUTO_UPDATE_PROVIDER: github
          AUTO_UPDATE_GITHUB_OWNER: ${{ github.repository_owner }}
          AUTO_UPDATE_GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Validate updater artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          yml_files=(dist/${APP_ID}/*.yml)
          blockmap_files=(dist/${APP_ID}/*.blockmap)
          appimage_files=(dist/${APP_ID}/*.AppImage)

          if [ ${#yml_files[@]} -eq 0 ]; then
            echo "Falta archivo .yml para updater en dist/${APP_ID}" >&2
            exit 1
          fi

          if [ ${#blockmap_files[@]} -eq 0 ]; then
            echo "Falta archivo .blockmap para updater en dist/${APP_ID}" >&2
            exit 1
          fi

          if [ ${#appimage_files[@]} -eq 0 ]; then
            echo "Falta archivo .AppImage en dist/${APP_ID}" >&2
            exit 1
          fi

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ env.APP_ID }}/*.AppImage
            dist/${{ env.APP_ID }}/*.AppImage.blockmap
            dist/${{ env.APP_ID }}/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
