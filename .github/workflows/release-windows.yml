name: Build and Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      appId:
        description: "ID de app en config/apps.json"
        required: false
        default: "felizometro"
      target:
        description: "Target de windows (nsis|portable)"
        required: false
        default: "nsis"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ia32]

    env:
      APP_ID: ${{ inputs.appId || 'felizometro' }}
      APP_TARGET: ${{ inputs.target || 'nsis' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        run: npm run build:app -- --app "$env:APP_ID" --platform win --target "$env:APP_TARGET" --arch ${{ matrix.arch }}
        env:
          AUTO_UPDATE_PROVIDER: github
          AUTO_UPDATE_GITHUB_OWNER: ${{ github.repository_owner }}
          AUTO_UPDATE_GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Validate updater artifacts
        shell: pwsh
        run: |
          $dist = "dist/$env:APP_ID"
          $yml = Get-ChildItem -Path $dist -Filter *.yml -ErrorAction SilentlyContinue
          $blockmap = Get-ChildItem -Path $dist -Filter *.blockmap -ErrorAction SilentlyContinue
          $executables = Get-ChildItem -Path $dist -Include *.exe,*.msi -File -ErrorAction SilentlyContinue

          if (-not $yml) {
            throw "Falta archivo .yml para updater en $dist"
          }

          if (-not $blockmap) {
            throw "Falta archivo .blockmap para updater en $dist"
          }

          if (-not $executables) {
            throw "No se encontro .exe o .msi en $dist"
          }

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Windows artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ env.APP_ID }}/*.exe
            dist/${{ env.APP_ID }}/*.msi
            dist/${{ env.APP_ID }}/*.blockmap
            dist/${{ env.APP_ID }}/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
