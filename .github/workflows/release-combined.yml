name: Build and Release Combined

on:
  workflow_dispatch:
    inputs:
      appId:
        description: "ID de app en config/apps.json"
        required: false
        default: "felizometro"
      releaseTag:
        description: "Tag de release (ej. v1.0.1). Si se deja vacio, usa v<package.json version>."
        required: false
        default: ""
      windowsTarget:
        description: "Target de Windows (nsis|portable)"
        required: false
        default: "nsis"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    env:
      APP_ID: ${{ inputs.appId || 'felizometro' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux ARM64 AppImage
        run: npm run build:app -- --app "$APP_ID" --platform linux --target AppImage --arch arm64
        env:
          AUTO_UPDATE_PROVIDER: github
          AUTO_UPDATE_GITHUB_OWNER: ${{ github.repository_owner }}
          AUTO_UPDATE_GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/${{ env.APP_ID }}/*.AppImage
            dist/${{ env.APP_ID }}/*.AppImage.blockmap
            dist/${{ env.APP_ID }}/*.yml
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ia32]
    env:
      APP_ID: ${{ inputs.appId || 'felizometro' }}
      APP_TARGET: ${{ inputs.windowsTarget || 'nsis' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        run: npm run build:app -- --app "$env:APP_ID" --platform win --target "$env:APP_TARGET" --arch ${{ matrix.arch }}
        env:
          AUTO_UPDATE_PROVIDER: github
          AUTO_UPDATE_GITHUB_OWNER: ${{ github.repository_owner }}
          AUTO_UPDATE_GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-artifacts
          path: |
            dist/${{ env.APP_ID }}/*.exe
            dist/${{ env.APP_ID }}/*.msi
            dist/${{ env.APP_ID }}/*.blockmap
            dist/${{ env.APP_ID }}/*.yml
          if-no-files-found: warn

  publish-release:
    runs-on: ubuntu-24.04
    needs:
      - build-linux
      - build-windows
    env:
      APP_ID: ${{ inputs.appId || 'felizometro' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ -n "${{ inputs.releaseTag }}" ]; then
            echo "tag=${{ inputs.releaseTag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release with combined artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.AppImage.blockmap
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
            release-artifacts/**/*.blockmap
            release-artifacts/**/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
