server {
  listen 80;
  server_name updates.tudominio.com;

  location /felizometro/ {
    alias /var/www/updates/felizometro/;
    autoindex off;

    # Permite descarga correcta de manifiestos y artefactos.
    types {
      application/octet-stream AppImage blockmap;
      text/yaml yml yaml;
    }

    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }
}
